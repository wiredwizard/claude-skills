site_name: Claude Code Skills & Agent Plugins
site_url: https://alirezarezvani.github.io/claude-skills/
site_description: "313 production-ready skills, 46+ cs-* agents (incl. founder-mode C-suite: GC, CDO, CAIO, CCO, VPE + Matt Pocock-derived productivity quartet: skill-author, caveman, grill-master, handoff + v2.7.0 megaprompt-derived research stack + v2.7.3 cs-aeo), 7 personas, 60+ /cs:* slash commands, and an orchestration protocol for 12 AI coding tools. v2.7.3 ports `alirezarezvani/aeo-box` — adds AEO (Answer Engine Optimization for LLM citation across ChatGPT / Perplexity / Claude / Gemini / Mistral) into marketing-skill and a security-guidance PreToolUse hook into engineering."
site_author: Alireza Rezvani
repo_url: https://github.com/alirezarezvani/claude-skills
repo_name: alirezarezvani/claude-skills
edit_uri: edit/main/docs/
copyright: "Built by Alireza Rezvani"

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - header.autohide
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    annotation: material/chevron-right-circle

plugins:
  - search:
      separator: '[\s\-\.]+'
  - tags
  - redirects:
      redirect_maps:
        # Dual-publish duplicate cleanup (v2.5.6 docs refresh).
        # The auto-generator created <name>-<name>.md alongside the canonical
        # <name>.md for engineering plugins that publish both standalone and
        # bundled. Redirect old URLs to the canonical page to preserve SEO.
        'skills/engineering/chaos-engineering-chaos-engineering.md': 'skills/engineering/chaos-engineering.md'
        'skills/engineering/feature-flags-architect-feature-flags-architect.md': 'skills/engineering/feature-flags-architect.md'
        'skills/engineering/kubernetes-operator-kubernetes-operator.md': 'skills/engineering/kubernetes-operator.md'
        'skills/engineering/slo-architect-slo-architect.md': 'skills/engineering/slo-architect.md'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alirezarezvani/claude-skills
      name: GitHub
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/nginitycloud
      name: Twitter
    - icon: fontawesome/brands/medium
      link: https://alirezarezvani.medium.com
      name: Medium
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

